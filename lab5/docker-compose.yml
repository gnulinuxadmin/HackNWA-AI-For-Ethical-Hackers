version: "3.9"

services:
  openclaw:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: openclaw-lab5
    ports:
      - "127.0.0.1:18789:18789"
    environment:
      OPENCLAW_HOME: /home/node/.openclaw
      OPENCLAW_PORT: "18789"
    volumes:
      - ./workspace:/workspace:ro
      - ./state:/lab5/state
      - ./config:/home/node/.openclaw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    # working_dir intentionally omitted — image default is /app where openclaw.mjs lives.
    # Overriding working_dir to /workspace causes node to crash on startup.
